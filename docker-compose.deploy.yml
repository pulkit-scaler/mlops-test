version: "3.8"
services:
  ml-api:
    image: ${ML_API_IMAGE}
    ports: ["8000:8000"]
    environment: [REDIS_HOST=redis, REDIS_PORT=6379, CACHE_TTL=300]
    depends_on: [redis]
    restart: unless-stopped
  ml-dashboard:
    image: ${ML_DASHBOARD_IMAGE}
    ports: ["8501:8501"]
    environment: [API_URL=http://ml-api:8000]
    depends_on: [ml-api]
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped
