name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  API_IMAGE_NAME: mlops-api
  DASHBOARD_IMAGE_NAME: mlops-dashboard
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ML API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE_NAME }}:latest

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: |
            ${{ env.DASHBOARD_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.DASHBOARD_IMAGE_NAME }}:latest

      - name: Save Docker images
        run: |
          docker save \
            ${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.API_IMAGE_NAME }}:latest \
            ${{ env.DASHBOARD_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.DASHBOARD_IMAGE_NAME }}:latest \
            -o mlops-images.tar

      - name: Upload Docker images artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: mlops-images.tar

  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Docker images artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Docker images
        run: docker load -i mlops-images.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push ML API image
        run: |
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          docker tag ${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.API_IMAGE_NAME }}:latest $ECR_REGISTRY/${{ env.API_IMAGE_NAME }}:latest
          docker push $ECR_REGISTRY/${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.API_IMAGE_NAME }}:latest

      - name: Tag and push Dashboard image
        run: |
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          docker tag ${{ env.DASHBOARD_IMAGE_NAME }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.DASHBOARD_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.DASHBOARD_IMAGE_NAME }}:latest $ECR_REGISTRY/${{ env.DASHBOARD_IMAGE_NAME }}:latest
          docker push $ECR_REGISTRY/${{ env.DASHBOARD_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.DASHBOARD_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: API_IMAGE_NAME,DASHBOARD_IMAGE_NAME,IMAGE_TAG,AWS_ACCOUNT_ID,AWS_REGION
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        script: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
          docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$API_IMAGE_NAME:$IMAGE_TAG
          docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$DASHBOARD_IMAGE_NAME:$IMAGE_TAG
          cd ~/mlops-model-serving || true
          docker compose -f docker-compose.deploy.yml down || true
          export ML_API_IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$API_IMAGE_NAME:$IMAGE_TAG
          export ML_DASHBOARD_IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$DASHBOARD_IMAGE_NAME:$IMAGE_TAG
          docker compose -f docker-compose.deploy.yml up -d
          sleep 10
          docker ps
